<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Applied before any CSS renders, so the page never flashes the
    // wrong theme on load. The click handler that sets this value
    // lives in js/main.js — this is only the "read it back" half.
    (function () {
      if (localStorage.getItem('rbc-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow" />
  <title>Log In | ResearchBridge Consulting</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(
        135deg,
        var(--navy) 0%,
        #0d2d5e 60%,
        #163a75 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 1rem 2rem;
    }

    .auth-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }

    .auth-logo img {
      height: 48px;
      width: 48px;
      object-fit: contain;
    }

    .auth-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--heading);
    }

    .auth-logo-text span {
      color: var(--royal);
    }

    .auth-card h2 {
      text-align: center;
      color: var(--heading);
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 1.8rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .auth-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .auth-form label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--heading);
    }

    .auth-form input {
      background: var(--light-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    .auth-form input:focus {
      border-color: var(--royal);
      background: var(--surface);
    }

    .auth-form input::placeholder {
      color: var(--muted);
      opacity: 0.7;
    }

    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #dc2626;
      font-size: 0.85rem;
      display: none;
    }

    .auth-error.visible {
      display: block;
    }

    .auth-submit {
      background: var(--royal);
      color: var(--on-dark);
      border: none;
      padding: 0.9rem;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      width: 100%;
      margin-top: 0.5rem;
    }

    .auth-submit:hover {
      background: var(--navy);
      transform: translateY(-1px);
    }

    .auth-switch {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1.2rem;
    }

    .auth-switch a {
      color: var(--royal);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.3rem;
    }

    .remember-check {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .remember-check input {
      width: auto;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.78rem;
    }

    .forgot-link a {
      color: var(--muted);
      text-decoration: none;
    }

    .forgot-link a:hover {
      color: var(--royal);
    }

    .auth-success {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }

    .auth-success.visible {
      display: block;
    }

    .auth-success-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .auth-success h3 {
      color: var(--heading);
      margin-bottom: 0.5rem;
    }

    .auth-success p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <a href="../" class="logo">
      <img src="../images/logo.png"
           alt="ResearchBridge Consulting"
           class="logo-img" />
      <span class="logo-text">Research<span>Bridge</span></span>
    </a>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
    </button>
    <div class="nav-auth">
      <div class="auth-logged-out" id="authLoggedOut">
        <a href="login" class="auth-btn-login">Log In</a>
        <a href="signup" class="auth-btn-signup">Sign Up</a>
      </div>
      <div class="auth-logged-in account-dropdown" id="authLoggedIn" style="display:none;">
        <button type="button" class="account-trigger" id="accountTrigger">
          <span id="authWelcome">Logged in as User</span>
          <span class="dropdown-arrow">›</span>
        </button>
        <div class="nav-dropdown" id="accountMenu">
          <a href="dashboard"><span class="icon-inline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="20" x2="5" y2="12"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="19" y1="20" x2="19" y2="15"/></svg></span> Dashboard</a>
          <a href="profile"><span>👤</span> Profile</a>
          <a href="#" id="authLogout"><span>🚪</span> Log Out</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- LOGIN PAGE -->
  <div class="auth-page">
    <div class="auth-card">

      <a href="../" class="auth-logo">
        <img src="../images/logo.png" alt="ResearchBridge" />
        <span class="auth-logo-text">
          Research<span>Bridge</span>
        </span>
      </a>

      <!-- FORM -->
      <div id="loginFormWrap">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">
          Log in to your ResearchBridge account.
        </p>

        <div class="auth-form">

          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="loginEmail"
                   placeholder="e.g. jean.uwimana@gmail.com" />
          </div>

          <div class="form-group">
            <label>Password *</label>
            <input type="password" id="loginPassword"
                   placeholder="Your password" />
            <div class="remember-row">
              <label class="remember-check">
                <input type="checkbox" id="rememberMe" />
                Remember me
              </label>
              <div class="forgot-link">
                <a href="forgot-password">Forgot password?</a>
              </div>
            </div>
          </div>

          <div class="auth-error" id="loginError"></div>

          <button class="auth-submit" id="loginSubmit">
            Log In →
          </button>

          <p class="auth-switch">
            Don't have an account?
            <a href="signup" id="signupCrossLink">Sign Up</a>
          </p>

        </div>
      </div>

      <!-- SUCCESS -->
      <div class="auth-success" id="loginSuccess">
        <div class="auth-success-icon">👋</div>
        <h3>Welcome Back!</h3>
        <p id="loginSuccessRedirectText">You are now logged in. Redirecting you to
        the homepage...</p>
      </div>

    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // ── LOGIN LOGIC ──
    const loginSubmit = document.getElementById('loginSubmit');
    const loginError = document.getElementById('loginError');
    const loginFormWrap = document.getElementById('loginFormWrap');
    const loginSuccess = document.getElementById('loginSuccess');

    // Where to send the user after a successful login. Set via
    // ?redirect=<url> by pages that need the visitor to log in first
    // (e.g. the homepage's guest promo widget). Falls back to the
    // homepage. Also carried forward to the Sign Up link, so someone
    // without an account doesn't lose their destination.
    const redirectTo = new URLSearchParams(window.location.search).get('redirect');
    if (redirectTo) {
      document.getElementById('signupCrossLink').href =
        `signup.html?redirect=${encodeURIComponent(redirectTo)}`;
      document.getElementById('loginSuccessRedirectText').textContent =
        'You are now logged in. Taking you back to where you left off…';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginSubmit.click();
    });

    loginSubmit.addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      // Validate
      if (!email || !password) {
        loginError.textContent = 'Please enter your email and password.';
        loginError.classList.add('visible');
        return;
      }

      loginSubmit.disabled = true;
      loginSubmit.textContent = 'Logging in…';

      window.rbcSetRememberMe(document.getElementById('rememberMe').checked);

      const supabase = await window.rbcSupabaseReady;
      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        loginError.textContent = error.message.toLowerCase().includes('email not confirmed')
          ? 'Please confirm your email address before logging in — check your inbox for a confirmation link.'
          : 'Incorrect email or password. Please try again.';
        loginError.classList.add('visible');
        loginSubmit.disabled = false;
        loginSubmit.textContent = 'Log In →';
        return;
      }

      loginError.classList.remove('visible');

      // Show success then redirect
      loginFormWrap.style.display = 'none';
      loginSuccess.classList.add('visible');

      setTimeout(() => {
        window.location.href = redirectTo || '../';
      }, 1500);
    });
  </script>

</body>
</html>
