<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In | ResearchBridge Consulting</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(
        135deg,
        var(--navy) 0%,
        #0d2d5e 60%,
        #163a75 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 1rem 2rem;
    }

    .auth-card {
      background: var(--white);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }

    .auth-logo img {
      height: 48px;
      width: 48px;
      object-fit: contain;
    }

    .auth-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--navy);
    }

    .auth-logo-text span {
      color: var(--royal);
    }

    .auth-card h2 {
      text-align: center;
      color: var(--navy);
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 1.8rem;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .auth-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .auth-form label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy);
    }

    .auth-form input {
      background: var(--light-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    .auth-form input:focus {
      border-color: var(--royal);
      background: var(--white);
    }

    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #dc2626;
      font-size: 0.85rem;
      display: none;
    }

    .auth-error.visible {
      display: block;
    }

    .auth-submit {
      background: var(--royal);
      color: var(--white);
      border: none;
      padding: 0.9rem;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      width: 100%;
      margin-top: 0.5rem;
    }

    .auth-submit:hover {
      background: var(--navy);
      transform: translateY(-1px);
    }

    .auth-switch {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1.2rem;
    }

    .auth-switch a {
      color: var(--royal);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .forgot-link {
      text-align: right;
      font-size: 0.78rem;
    }

    .forgot-link a {
      color: var(--muted);
      text-decoration: none;
    }

    .forgot-link a:hover {
      color: var(--royal);
    }

    .auth-success {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }

    .auth-success.visible {
      display: block;
    }

    .auth-success-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .auth-success h3 {
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    .auth-success p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <a href="../index.html" class="logo">
      <img src="../images/logo.png"
           alt="ResearchBridge Consulting"
           class="logo-img" />
      <span class="logo-text">Research<span>Bridge</span></span>
    </a>
    <div class="nav-auth">
      <div class="auth-logged-out" id="authLoggedOut">
        <a href="login.html" class="auth-btn-login">Log In</a>
        <a href="signup.html" class="auth-btn-signup">Sign Up</a>
      </div>
      <div class="auth-logged-in" id="authLoggedIn" style="display:none;">
        <span class="auth-welcome" id="authWelcome">Hi, User</span>
        <button class="auth-btn-logout" id="authLogout">Log Out</button>
      </div>
    </div>
  </nav>

  <!-- LOGIN PAGE -->
  <div class="auth-page">
    <div class="auth-card">

      <a href="../index.html" class="auth-logo">
        <img src="../images/logo.png" alt="ResearchBridge" />
        <span class="auth-logo-text">
          Research<span>Bridge</span>
        </span>
      </a>

      <!-- FORM -->
      <div id="loginFormWrap">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">
          Log in to your ResearchBridge account.
        </p>

        <div class="auth-form">

          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="loginEmail"
                   placeholder="e.g. jean.uwimana@gmail.com" />
          </div>

          <div class="form-group">
            <label>Password *</label>
            <input type="password" id="loginPassword"
                   placeholder="Your password" />
            <div class="forgot-link">
              <a href="#">Forgot password?</a>
            </div>
          </div>

          <div class="auth-error" id="loginError"></div>

          <button class="auth-submit" id="loginSubmit">
            Log In →
          </button>

          <p class="auth-switch">
            Don't have an account?
            <a href="signup.html" id="signupCrossLink">Sign Up</a>
          </p>

        </div>
      </div>

      <!-- SUCCESS -->
      <div class="auth-success" id="loginSuccess">
        <div class="auth-success-icon">👋</div>
        <h3>Welcome Back!</h3>
        <p id="loginSuccessRedirectText">You are now logged in. Redirecting you to
        the homepage...</p>
      </div>

    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // ── LOGIN LOGIC ──
    const loginSubmit = document.getElementById('loginSubmit');
    const loginError = document.getElementById('loginError');
    const loginFormWrap = document.getElementById('loginFormWrap');
    const loginSuccess = document.getElementById('loginSuccess');

    // Where to send the user after a successful login. Set via
    // ?redirect=<url> by pages that need the visitor to log in first
    // (e.g. the homepage's guest promo widget). Falls back to the
    // homepage. Also carried forward to the Sign Up link, so someone
    // without an account doesn't lose their destination.
    const redirectTo = new URLSearchParams(window.location.search).get('redirect');
    if (redirectTo) {
      document.getElementById('signupCrossLink').href =
        `signup.html?redirect=${encodeURIComponent(redirectTo)}`;
      document.getElementById('loginSuccessRedirectText').textContent =
        'You are now logged in. Taking you back to where you left off…';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginSubmit.click();
    });

    loginSubmit.addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      // Validate
      if (!email || !password) {
        loginError.textContent = 'Please enter your email and password.';
        loginError.classList.add('visible');
        return;
      }

      loginSubmit.disabled = true;
      loginSubmit.textContent = 'Logging in…';

      const supabase = await window.rbcSupabaseReady;
      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        loginError.textContent = error.message.toLowerCase().includes('email not confirmed')
          ? 'Please confirm your email address before logging in — check your inbox for a confirmation link.'
          : 'Incorrect email or password. Please try again.';
        loginError.classList.add('visible');
        loginSubmit.disabled = false;
        loginSubmit.textContent = 'Log In →';
        return;
      }

      loginError.classList.remove('visible');

      // Show success then redirect
      loginFormWrap.style.display = 'none';
      loginSuccess.classList.add('visible');

      setTimeout(() => {
        window.location.href = redirectTo || '../index.html';
      }, 1500);
    });
  </script>

</body>
</html>
